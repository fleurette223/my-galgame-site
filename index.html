<style>:root{--text-color:#222;--light-text:#888;--bg-color:#ffffff;--noise-url:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E")}html{scroll-behavior:smooth}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Serif JP',serif;color:var(--text-color);background-color:var(--bg-color);overflow:hidden;width:100%;user-select:none}.white-blur-bg{position:fixed;inset:0;background:radial-gradient(circle at 50% 50%,#fff 0,#f7f7f7 100%);animation:pulse 12s ease-in-out infinite alternate;z-index:-2}@keyframes pulse{0%{transform:scale(1);filter:blur(0px)}100%{transform:scale(1.1);filter:blur(12px)}}.noise-overlay{position:fixed;inset:0;background-image:var(--noise-url);opacity:.04;pointer-events:none;z-index:999}noscript #js-warning{display:flex!important}#js-warning{position:fixed;inset:0;background:#fff;display:none;flex-direction:column;justify-content:center;align-items:center;z-index:9999999;font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:6px;color:#888;text-align:center;line-height:2}#headphone-hint{position:fixed;bottom:12%;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:4px;color:var(--light-text);opacity:0;transition:opacity 3s ease;z-index:101;pointer-events:none}#headphone-hint.show{opacity:1}#headphone-hint.hide{opacity:0!important}.audio-control{position:fixed;bottom:30px;right:40px;font-size:10px;letter-spacing:4px;color:#aaa;cursor:pointer;z-index:900;transition:color .5s ease;opacity:0;pointer-events:none}.audio-control.visible{opacity:1;pointer-events:auto}#intro-layer{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background-color:var(--bg-color);z-index:100;transition:transform 2.5s cubic-bezier(.25, 1, .3, 1),opacity 2s ease}#intro-layer.zoom-in{transform:scale(1.4);opacity:0;pointer-events:none}.vertical-text{writing-mode:vertical-rl;font-size:clamp(18px, 4vw, 24px);font-weight:300;letter-spacing:clamp(6px, 2vw, 10px);line-height:2;opacity:0;filter:blur(15px);transition:opacity 2s ease,filter 2.5s ease-out}.vertical-text.show{opacity:1;filter:blur(0)}.particle{position:absolute;background-color:var(--text-color);border-radius:50%;pointer-events:none;transition:transform 1.5s cubic-bezier(.1, .8, .3, 1),opacity 1.5s ease-out}#main-site{opacity:0;visibility:hidden;transition:opacity 2.5s ease .5s;position:relative;z-index:10}#main-site.visible{opacity:1;visibility:visible}header{position:fixed;top:0;width:100%;padding:clamp(20px,3vh,40px) 0;display:flex;justify-content:center;gap:clamp(20px,4vw,50px);background:rgba(255,255,255,.7);backdrop-filter:blur(10px);z-index:50}section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:100px 20px;text-align:center}.reveal{opacity:0;transform:translateY(30px);filter:blur(5px);transition:all 1.5s cubic-bezier(.25, 1, .3, 1)}.reveal.active{opacity:1;transform:translateY(0);filter:blur(0)}.sec-title{font-size:clamp(24px, 5vw, 36px);font-weight:300;letter-spacing:clamp(8px, 3vw, 16px);margin-bottom:10px}.sec-subtitle{font-size:10px;color:var(--light-text);letter-spacing:6px;margin-bottom:60px;text-transform:uppercase}.btn-donate{background:0 0;border:none;color:var(--text-color);font-size:12px;letter-spacing:8px;cursor:pointer;font-family:'Noto Serif JP',serif;padding:10px 0}#epilogue{height:100vh;position:relative}</style>

<noscript><div id=js-warning>—— 閲覧するにはJavaScriptを有効にしてください ——</div></noscript>
<audio id=bgm loop><source src=./music.mp3 type=audio/mpeg></audio>
<div class=white-blur-bg></div><div class=noise-overlay></div>
<div id=headphone-hint>[ 推荐佩戴耳机浏览 · 任意点击开启音效 ]</div>
<div id=audio-control class=audio-control>SOUND : OFF</div>
<div id=intro-layer><div class=vertical-text id=intro-text>「请翻开这一页，<br>成为旅途中新的见证者——</div></div>
<div id=main-site>
<header id=nav-header><a href=#hero>首页</a><a href=#story>故事</a><a href=#staff>职员</a><a href=#support>捐赠</a></header>
<section id=hero><div class=reveal><div class=site-title style="font-size:clamp(32px, 8vw, 56px)">彼岸之外</div><div class=sec-subtitle>MAJO NO TABITABI FAN-MADE VISUAL NOVEL</div></div></section>
<section id=story><div class=reveal><h2 class=sec-title>物語</h2><div class=sec-subtitle>STORY</div><div class=story-text style=max-width:600px;font-size:14px;line-height:2.5><p>那是，比离别更漫长的一段时光。</p><br><p>我们相遇于两个截然不同的世界，也同行于同一片天空之下。</p><br><p>「风会停下，而旅人不会。」</p></div></div></section>
<section id=staff><div class=reveal><h2 class=sec-title>制作陣</h2><div class=sec-subtitle>STAFF</div><div class=staff-list style=display:flex;flex-direction:column;gap:35px><div class=staff-item><span class=staff-role style=font-size:10px;color:#888>核心主导</span><br><span class=staff-name>鸳鸣</span></div></div><div style=margin-top:70px;font-size:12px;color:#888>想成为旅途的同行者？<br><br><a href=mailto:3841850167@qq.com style="color:#444;border-bottom:1px solid #ccc">[ 联络制作组 ]</a></div></div></section>
<section id=support><button class=btn-donate onclick='window.open("./donate.html","_blank")'>捐赠</button></section>
</div>
